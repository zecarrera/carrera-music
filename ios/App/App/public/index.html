    <!-- Keep YouTube player alive when screen locks / app backgrounds.
         YouTube's iframe JS watches document.hidden and visibilityState —
         it self-pauses the moment either becomes true/hidden.
         We override both getters and intercept the visibilitychange event
         (capture phase, before YouTube's listener) so the player never
         learns the page went background.
         Combined with UIBackgroundModes:audio + AVAudioSession(.playback)
         in native code, this allows audio to continue on lock screen. -->
    <script>
      (function () {
        try {
          Object.defineProperty(document, 'hidden', { get: () => false, configurable: true });
          Object.defineProperty(document, 'visibilityState', { get: () => 'visible', configurable: true });
          // Swallow the event before any listener (including YouTube's) sees it
          document.addEventListener('visibilitychange', function (e) {
            e.stopImmediatePropagation();
          }, true);
        } catch (e) { /* silently ignore if browser blocks override */ }
      })();
    </script>
